apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: apps-hello-world
  namespace: apps-hello-world
spec:
  parentRefs:
    - name: private
      namespace: istio-system
      sectionName: http
  hostnames:
    - "hello-world.local"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: apps-hello-world
          port: 80
