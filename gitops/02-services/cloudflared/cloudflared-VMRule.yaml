apiVersion: operator.victoriametrics.com/v1beta1
kind: VMRule
metadata:
  name: cloudflared-alerts
  namespace: cloudflared
spec:
  groups:
    - name: cloudflared
      rules:
        - alert: CloudflaredTunnelDown
          expr: cloudflared_tunnel_ha_connections < 1
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Cloudflare tunnel has no active connections"
        - alert: CloudflaredTunnelDegraded
          expr: cloudflared_tunnel_ha_connections < 4
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Cloudflare tunnel has only {{ $value }}/4 connections"
        - alert: CloudflaredRequestErrors
          expr: rate(cloudflared_tunnel_request_errors[5m]) > 0.1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Cloudflare tunnel request errors ({{ $value }}/s)"
        - alert: CloudflaredRegistrationFailures
          expr: increase(cloudflared_rpc_client_failures[10m]) > 3
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Cloudflare tunnel registration failures"
        - alert: CloudflaredHighConnectLatency
          expr: cloudflared_proxy_connect_latency_sum / cloudflared_proxy_connect_latency_count > 5000
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Cloudflare tunnel connect latency above 5s"
