apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: operator-oauth
  namespace: tailscale
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: operator-oauth
  data:
    - secretKey: client_id
      remoteRef:
        key: secret/tailscale/operator
        property: client-id
    - secretKey: client_secret
      remoteRef:
        key: secret/tailscale/operator
        property: client-secret
