apiVersion: batch/v1
kind: Job
metadata:
  name: vault-setup
  namespace: vault
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 10
  template:
    spec:
      serviceAccountName: vault
      restartPolicy: OnFailure
      containers:
        - name: vault-setup
          image: hashicorp/vault:1.21.2
          env:
            - name: VAULT_ADDR
              value: "http://vault.vault.svc.cluster.local:8200"
          command:
            - /bin/sh
            - -ec
            - |
              # Wait for Vault to be ready and unsealed
              until vault status 2>&1 | grep -q "Sealed.*false"; do
                echo "Waiting for Vault to be initialized and unsealed..."
                sleep 5
              done

              echo "Vault is unsealed. Configuring..."

              # Login with root token from the init secret
              # You must create this secret manually after vault operator init:
              #   kubectl create secret generic vault-root-token -n vault --from-literal=token=<root-token>
              export VAULT_TOKEN=$(cat /vault-root-token/token)

              # Enable KV v2 secrets engine (idempotent check)
              if ! vault secrets list | grep -q "^secret/"; then
                vault secrets enable -path=secret kv-v2
                echo "Enabled KV v2 at secret/"
              else
                echo "KV v2 already enabled at secret/"
              fi

              # Create policy for external-secrets
              vault policy write external-secrets - <<'POLICY'
              path "secret/data/*" {
                capabilities = ["read"]
              }
              path "secret/metadata/*" {
                capabilities = ["read", "list"]
              }
              POLICY
              echo "Created external-secrets policy"

              # Enable Kubernetes auth method (idempotent check)
              if ! vault auth list | grep -q "^kubernetes/"; then
                vault auth enable kubernetes
                echo "Enabled Kubernetes auth"
              else
                echo "Kubernetes auth already enabled"
              fi

              # Configure Kubernetes auth to use in-cluster config
              vault write auth/kubernetes/config \
                kubernetes_host="https://kubernetes.default.svc.cluster.local:443"
              echo "Configured Kubernetes auth"

              # Create role for external-secrets service account
              vault write auth/kubernetes/role/external-secrets \
                bound_service_account_names=external-secrets \
                bound_service_account_namespaces=external-secrets \
                policies=external-secrets \
                ttl=1h
              echo "Created external-secrets role"

              echo "Vault setup complete!"
          volumeMounts:
            - name: vault-root-token
              mountPath: /vault-root-token
              readOnly: true
      volumes:
        - name: vault-root-token
          secret:
            secretName: vault-root-token
